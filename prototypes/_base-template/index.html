<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Prototype Name</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="app-shell">
        <div class="status-bar">
            <span>9:41</span>
            <span>●●● ▸ 🔋</span>
        </div>

        <div class="screen-header">
            <h1>Screen Title</h1>
            <p>Subtitle or description</p>
        </div>

        <div class="card">
            <div class="row">
                <div style="width:40px;height:40px;border-radius:12px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:18px">📍</div>
                <div style="flex:1">
                    <div style="font-weight:600">Row Title</div>
                    <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px">Supporting text</div>
                </div>
            </div>
            <div class="row">
                <div style="width:40px;height:40px;border-radius:12px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:18px">🏢</div>
                <div style="flex:1">
                    <div style="font-weight:600">Another Row</div>
                    <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px">More supporting text</div>
                </div>
            </div>
        </div>

        <div style="flex:1"></div>

        <button class="btn-primary">Primary Action</button>
        <div style="height:16px"></div>
        <div class="home-indicator"></div>
    </div>

    <button class="theme-toggle" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? '' : 'dark'">🌓</button>
</body>
</html>
